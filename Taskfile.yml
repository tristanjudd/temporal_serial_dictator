version: '3'

vars:
  VENV: .venv

tasks:
  venv:
    desc: Create the virtual environment
    status:
      - test -d {{.VENV}}
    cmds:
      - python3 -m venv {{.VENV}}

  install:
    desc: Install project dependencies (editable, with dev extras)
    deps: [venv]
    sources:
      - pyproject.toml
    cmds:
      - "{{.VENV}}/bin/pip install -e '.[dev]'"

  lint:
    desc: Run ruff lint checks
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/ruff check ."

  format:
    desc: Auto-fix lint issues and format code with ruff
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/ruff check --fix ."
      - "{{.VENV}}/bin/ruff format ."

  typecheck:
    desc: Run mypy type checks
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/mypy ."

  test:
    desc: Run pytest tests
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/pytest"

  check:
    desc: Run lint, typecheck, and tests
    cmds:
      - task: lint
      - task: typecheck
      - task: test

  hooks:
    desc: Install the git pre-commit hooks
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/pre-commit install"

  synthetic-experiment:
    desc: "Run synthetic serial dictator experiments (usage: task synthetic-experiment T=20 N=20 M=5 THRESHOLD=1.5 NUM_EXPERIMENTS=100)"
    deps: [install]
    vars:
      T: '{{.T | default "20"}}'
      N: '{{.N | default "20"}}'
      M: '{{.M | default "5"}}'
      THRESHOLD: '{{.THRESHOLD | default "1.5"}}'
      NUM_EXPERIMENTS: '{{.NUM_EXPERIMENTS | default "1"}}'
    cmds:
      - "{{.VENV}}/bin/python -m src.synthetic_data_tools.run_synthetic_experiment {{.T}} --n {{.N}} --m {{.M}} --approval-threshold {{.THRESHOLD}} --num-experiments {{.NUM_EXPERIMENTS}}"

  natural-experiment:
    desc: "Run a serial dictator experiment on real data (usage: task natural-experiment DIR=real_data/json_datasets/eurovision_song_contest_tsoi DOWNSIZE=true SAMPLE_SIZE=25 NUM_EXPERIMENTS=10)"
    deps: [install]
    vars:
      DOWNSIZE: '{{.DOWNSIZE | default "false"}}'
      SAMPLE_SIZE: '{{.SAMPLE_SIZE | default "25"}}'
      NUM_EXPERIMENTS: '{{.NUM_EXPERIMENTS | default "1"}}'
    cmds:
      - "{{.VENV}}/bin/python -m src.real_data_tools.run_natural_experiment {{.DIR}} {{if eq .DOWNSIZE \"true\"}}--downsize {{end}}--sample-size {{.SAMPLE_SIZE}} --num-experiments {{.NUM_EXPERIMENTS}}"

  aaai-experiment:
    desc: "Run the paper's synthetic experiment grid (usage: task aaai-experiment NUM_EXPERIMENTS=1000)"
    deps: [install]
    vars:
      NUM_EXPERIMENTS: '{{.NUM_EXPERIMENTS | default "10"}}'
    cmds:
      - "{{.VENV}}/bin/python -m src.synthetic_data_tools.aaai_experiment --num-experiments {{.NUM_EXPERIMENTS}}"

  clean-experiments:
    desc: Delete all generated experiment output
    cmds:
      - rm -rf experiments/* 

  verify-pjr:
    desc: "Verify PJR for a saved experiment (usage: task verify-pjr DIR=T20-n20-..., defaults to the most recent experiment)"
    deps: [install]
    vars:
      DEFAULT_DIR:
        sh: ls -t experiments | head -1
      DIR: '{{.DIR | default .DEFAULT_DIR}}'
    cmds:
      - "{{.VENV}}/bin/python -m src.verification.verify_pjr experiments/{{.DIR}}"

  multi-verify-pjr:
    desc: "Verify PJR for a saved experiment using multiprocessing (usage: task multi-verify-pjr DIR=T20-n20-... MAX_WORKERS=8, defaults to the most recent experiment and all CPU cores)"
    deps: [install]
    vars:
      DEFAULT_DIR:
        sh: ls -t experiments | head -1
      DIR: '{{.DIR | default .DEFAULT_DIR}}'
      MAX_WORKERS: '{{.MAX_WORKERS | default ""}}'
    cmds:
      - "{{.VENV}}/bin/python -m src.verification.multiprocessing_verify_pjr experiments/{{.DIR}}{{if .MAX_WORKERS}} --max-workers {{.MAX_WORKERS}}{{end}}"

  convert-lackner-datasets:
    desc: Convert all real .tsoi datasets to JSONL under real_data/json_datasets (skipped if already populated)
    deps: [install]
    status:
      - 'test -d real_data/json_datasets && [ "$(ls -A real_data/json_datasets)" ]'
    cmds:
      - "{{.VENV}}/bin/python -m src.data_transformation.convert_lackner_datasets"

  clean-json-datasets:
    desc: Delete all converted JSONL datasets under real_data/json_datasets
    cmds:
      - rm -rf real_data/json_datasets
