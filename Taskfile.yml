version: '3'

vars:
  VENV: .venv

tasks:
  venv:
    desc: Create the virtual environment
    status:
      - test -d {{.VENV}}
    cmds:
      - python3 -m venv {{.VENV}}

  install:
    desc: Install project dependencies (editable, with dev extras)
    deps: [venv]
    sources:
      - pyproject.toml
    cmds:
      - "{{.VENV}}/bin/pip install -e '.[dev]'"

  lint:
    desc: Run ruff lint checks
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/ruff check ."

  format:
    desc: Format code with ruff
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/ruff format ."

  typecheck:
    desc: Run mypy type checks
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/mypy ."

  test:
    desc: Run pytest tests
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/pytest"

  check:
    desc: Run lint, typecheck, and tests
    cmds:
      - task: lint
      - task: typecheck
      - task: test

  hooks:
    desc: Install the git pre-commit hooks
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/pre-commit install"

  experiment:
    desc: "Run synthetic serial dictator experiments (usage: task experiment T=20 NUM_EXPERIMENTS=100)"
    deps: [install]
    vars:
      T: '{{.T | default "20"}}'
      NUM_EXPERIMENTS: '{{.NUM_EXPERIMENTS | default "1"}}'
    cmds:
      - "{{.VENV}}/bin/python -m src.synthetic_data.run_synthetic_experiment {{.T}} --num-experiments {{.NUM_EXPERIMENTS}}"

  clean-experiments:
    desc: Delete all generated experiment output
    cmds:
      - rm -rf experiments
