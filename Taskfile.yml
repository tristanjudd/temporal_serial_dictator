version: '3'

vars:
  VENV: .venv

tasks:
  venv:
    desc: Create the virtual environment
    status:
      - test -d {{.VENV}}
    cmds:
      - python3 -m venv {{.VENV}}

  install:
    desc: Install project dependencies (editable, with dev extras)
    deps: [venv]
    sources:
      - pyproject.toml
    cmds:
      - "{{.VENV}}/bin/pip install -e '.[dev]'"

  lint:
    desc: Run ruff lint checks
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/ruff check ."

  format:
    desc: Auto-fix lint issues and format code with ruff
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/ruff check --fix ."
      - "{{.VENV}}/bin/ruff format ."

  typecheck:
    desc: Run mypy type checks
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/mypy ."

  test:
    desc: Run pytest tests
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/pytest"

  check:
    desc: Run lint, typecheck, and tests
    cmds:
      - task: lint
      - task: typecheck
      - task: test

  hooks:
    desc: Install the git pre-commit hooks
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/pre-commit install"

  synthetic-experiment:
    desc: "Run synthetic serial dictator experiments (usage: task synthetic-experiment T=20 N=20 M=5 NUM_EXPERIMENTS=100)"
    deps: [install]
    vars:
      T: '{{.T | default "20"}}'
      N: '{{.N | default "20"}}'
      M: '{{.M | default "5"}}'
      NUM_EXPERIMENTS: '{{.NUM_EXPERIMENTS | default "1"}}'
    cmds:
      - "{{.VENV}}/bin/python -m src.synthetic_data_tools.run_synthetic_experiment {{.T}} --n {{.N}} --m {{.M}} --num-experiments {{.NUM_EXPERIMENTS}}"

  natural-experiment:
    desc: "Run a serial dictator experiment on real data (usage: task natural-experiment DIR=real_data/eurovision_song_contest_tsoi)"
    deps: [install]
    cmds:
      - "{{.VENV}}/bin/python -m src.real_data_tools.run_natural_experiment {{.DIR}}"

  clean-experiments:
    desc: Delete all generated experiment output
    cmds:
      - rm -rf experiments/*

  verify-pjr:
    desc: "Verify PJR for a saved experiment (usage: task verify-pjr DIR=T20-n20-..., defaults to the most recent experiment)"
    deps: [install]
    vars:
      DEFAULT_DIR:
        sh: ls -t experiments | head -1
      DIR: '{{.DIR | default .DEFAULT_DIR}}'
    cmds:
      - "{{.VENV}}/bin/python -m src.verification.verify_pjr experiments/{{.DIR}}"
